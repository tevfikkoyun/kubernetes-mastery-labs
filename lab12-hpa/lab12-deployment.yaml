apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab12-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab12-app
  template:
    metadata:
      labels:
        app: lab12-app
    spec:
      containers:
        - name: app
          image: nginx:alpine
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: lab12-service
spec:
  selector:
    app: lab12-app
  ports:
    - port: 80