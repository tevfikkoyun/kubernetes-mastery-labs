apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lab12-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lab12-app
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0